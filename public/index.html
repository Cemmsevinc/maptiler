<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relocate</title>
  <script src="https://cdn.maptiler.com/maptiler-sdk-js/latest/maptiler-sdk.umd.min.js"></script>
  <link href="https://cdn.maptiler.com/maptiler-sdk-js/latest/maptiler-sdk.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #0a0a0a; color: #f0ebe3; height: 100vh; overflow: hidden; }
    #map { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

    /* ── FULL-HEIGHT PANEL ── */
    #panel {
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 20;
      width: 420px;
      background: rgba(8,8,8,0.97); backdrop-filter: blur(28px);
      border-right: 1px solid rgba(240,235,227,0.1);
      overflow: hidden; opacity: 0; pointer-events: none;
      transform: translateX(-32px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      display: flex; flex-direction: column;
    }
    #panel.visible { opacity: 1; pointer-events: all; transform: translateX(0); }

    #photo-main {
      width: 100%; height: 220px; object-fit: cover; flex-shrink: 0;
      background: #111; display: block; transition: opacity 0.4s;
    }
    #photo-thumbs { display: flex; gap: 2px; flex-shrink: 0; background: #080808; }
    .thumb { height: 52px; flex: 1; object-fit: cover; cursor: pointer; opacity: 0.4; transition: opacity 0.25s, flex 0.35s; min-width: 0; display: block; }
    .thumb:hover { opacity: 0.7; }
    .thumb.active { opacity: 1; flex: 2.4; }

    #panel-body { padding: 18px 20px 20px; overflow-y: auto; flex: 1; }
    #panel-body::-webkit-scrollbar { width: 3px; }
    #panel-body::-webkit-scrollbar-thumb { background: rgba(240,235,227,0.1); border-radius: 2px; }

    #panel-label { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: rgba(240,235,227,0.28); margin-bottom: 6px; }
    #place-name { font-size: 22px; line-height: 1.3; color: #f0ebe3; margin-bottom: 10px; }
    #place-story { font-size: 12.5px; line-height: 1.85; color: rgba(240,235,227,0.58); margin-bottom: 16px; min-height: 44px; }

    /* ── INTERESTING FACT ── */
    #fact-section {
      background: rgba(240,235,227,0.04);
      border-radius: 10px; padding: 13px 15px;
      margin-bottom: 16px;
      border-left: 3px solid rgba(240,235,227,0.2);
      display: none;
    }
    #fact-section.visible { display: block; }
    .fact-title {
      font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(240,235,227,0.32); margin-bottom: 7px;
    }
    #place-fact { font-size: 12.5px; line-height: 1.75; color: rgba(240,235,227,0.7); font-style: italic; }

    /* ── COLORED STATS ── */
    #stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
    .stat-box { background: rgba(240,235,227,0.03); border-radius: 10px; padding: 10px 12px; border-left: 3px solid transparent; }
    .stat-box.rent    { border-left-color: #5cb85c; }
    .stat-box.saving  { border-left-color: #4a9aff; }
    .stat-box.climate { border-left-color: #f0ad4e; }
    .stat-box.flight  { border-left-color: #b88aff; }
    .stat-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .stat-box.rent    .stat-label { color: #5cb85c; }
    .stat-box.saving  .stat-label { color: #4a9aff; }
    .stat-box.climate .stat-label { color: #f0ad4e; }
    .stat-box.flight  .stat-label { color: #b88aff; }
    .stat-value { font-size: 13px; color: rgba(240,235,227,0.88); line-height: 1.3; }

    /* ── NEIGHBOURHOOD LIST ── */
    #nb-section-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(240,235,227,0.28); margin-bottom: 9px; }
    #nb-list { display: flex; flex-direction: column; gap: 6px; }
    .nb-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 9px;
      border: 1px solid rgba(240,235,227,0.07);
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .nb-row:hover { background: rgba(240,235,227,0.06); border-color: rgba(240,235,227,0.15); }
    .nb-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
    .nb-row-name { font-size: 13px; color: rgba(240,235,227,0.78); flex: 1; }
    .nb-row-rent { font-size: 12px; color: rgba(240,235,227,0.4); }

    /* ── MINI CARDS (top-right, 2 non-selected cities) ── */
    #mini-cards {
      position: fixed; left: 420px; top: 0; right: 0; height: 200px;
      z-index: 19; display: flex;
      transform: translateY(-100%);
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
    }
    #mini-cards.visible { transform: translateY(0); }

    .mini-card {
      flex: 1; position: relative; cursor: pointer; overflow: hidden;
      border-left: 1px solid rgba(0,0,0,0.5);
    }
    .mini-card:first-child { border-left: none; }
    .mini-card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 0.5s ease; }
    .mini-card:hover .mini-card-bg { transform: scale(1.05); }

    .ph-0 { background: linear-gradient(145deg,#5a3a28,#b08060); }
    .ph-1 { background: linear-gradient(145deg,#1a3d22,#4a8a4a); }
    .ph-2 { background: linear-gradient(145deg,#152438,#3a6090); }

    .mini-card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.02) 55%, rgba(0,0,0,0.18) 100%); }
    .mini-card-ring { position: absolute; inset: 0; border: 2px solid transparent; transition: border-color 0.25s; z-index: 3; pointer-events: none; }
    .mini-card:hover .mini-card-ring { border-color: rgba(255,255,255,0.5); }
    .mini-card-num { position: absolute; top: 14px; left: 16px; font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.35); z-index: 2; }
    .mini-card-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 18px; z-index: 2; }
    .mini-card-name { font-size: 17px; color: #fff; margin-bottom: 5px; line-height: 1.25; }
    .mini-card-stat { font-size: 11px; color: rgba(255,255,255,0.5); }
    .mini-card-stat span { color: #fff; font-size: 12px; margin-right: 3px; }

    /* ── LEGEND ── */
    #legend {
      position: fixed; bottom: 100px; right: 20px; z-index: 15;
      background: rgba(8,8,8,0.9); backdrop-filter: blur(16px);
      border: 1px solid rgba(240,235,227,0.1); border-radius: 10px;
      padding: 10px 14px; display: none; flex-direction: column; gap: 4px;
    }
    #legend.visible { display: flex; }
    .legend-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(240,235,227,0.28); margin-bottom: 4px; }
    .legend-item {
      display: flex; align-items: center; gap: 9px; font-size: 12px; color: rgba(240,235,227,0.65);
      cursor: pointer; padding: 5px 8px; border-radius: 7px; margin: 0 -8px;
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }
    .legend-item:hover { background: rgba(240,235,227,0.07); color: rgba(240,235,227,0.9); }
    .legend-item.active { background: rgba(240,235,227,0.12); color: #fff; }
    .legend-item .legend-hint { font-size: 9px; color: rgba(240,235,227,0.3); margin-left: auto; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); flex-shrink: 0; }

    /* ── NEIGHBOURHOOD POPUP ── */
    .nb-popup .maplibregl-popup-content {
      background: rgba(8,8,8,0.96) !important; border: 1px solid rgba(240,235,227,0.18) !important;
      border-radius: 12px !important; padding: 14px 18px !important;
      box-shadow: 0 4px 28px rgba(0,0,0,0.7) !important;
      font-family: 'Georgia', serif !important; min-width: 200px; color: #f0ebe3 !important;
    }
    .nb-popup .maplibregl-popup-tip { display: none !important; }
    .nb-popup .maplibregl-popup-close-button { color: rgba(240,235,227,0.35) !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }
    .nb-name { font-size: 15px; color: #f0ebe3; margin-bottom: 5px; }
    .nb-rent { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
    .nb-rent.budget { color: #5cb85c; }
    .nb-rent.mid    { color: #f0ad4e; }
    .nb-rent.premium{ color: #d9534f; }
    .nb-vibe { font-size: 12px; color: rgba(240,235,227,0.55); line-height: 1.65; }

    /* ── EMPTY STATE ── */
    #empty-state {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 10; text-align: center; pointer-events: none; transition: opacity 0.4s;
    }
    #empty-state.hidden { opacity: 0; }
    #empty-state h2 { font-size: 30px; font-weight: normal; color: rgba(240,235,227,0.85); line-height: 1.5; margin-bottom: 12px; text-shadow: 0 2px 24px rgba(0,0,0,0.7); }
    #empty-state p { font-size: 13px; color: rgba(240,235,227,0.35); line-height: 1.7; }

    /* ── INPUT (centered in the map area to the right of panel) ── */
    #bottom {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 22; width: 600px; max-width: calc(100vw - 40px);
      transition: left 0.5s ease, transform 0.5s ease;
    }
    #bottom.with-panel {
      left: calc(210px + 50vw);
    }
    #input-wrap {
      display: flex; align-items: center;
      background: rgba(8,8,8,0.95); backdrop-filter: blur(20px);
      border: 1px solid rgba(240,235,227,0.14); border-radius: 40px;
      padding: 7px 7px 7px 24px; gap: 8px; transition: border-color 0.3s;
    }
    #input-wrap:focus-within { border-color: rgba(240,235,227,0.38); }
    #vibe-input { flex: 1; background: none; border: none; outline: none; color: #f0ebe3; font-family: 'Georgia', serif; font-size: 14px; min-width: 0; }
    #vibe-input::placeholder { color: rgba(240,235,227,0.27); }
    #submit-btn {
      background: rgba(240,235,227,0.92); color: #0a0a0a; border: none; border-radius: 32px;
      padding: 11px 26px; font-family: 'Georgia', serif; font-size: 13px;
      cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
    }
    #submit-btn:hover { background: #fff; }
    #submit-btn:active { transform: scale(0.97); }
    #submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #loading {
      position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
      z-index: 20; font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(240,235,227,0.32); opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #loading.visible { opacity: 1; }

    /* ── RIPPLE ── */
    .ripple-wrap { position: relative; width: 16px; height: 16px; }
    .ripple-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 10px; height: 10px; background: #fff; border-radius: 50%; z-index: 2; box-shadow: 0 0 8px rgba(255,255,255,0.8); }
    .ripple-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); border: 1.5px solid rgba(255,255,255,0.5); border-radius: 50%; animation: rippleOut 2.4s ease-out infinite; }
    .ripple-ring:nth-child(1) { animation-delay: 0s; }
    .ripple-ring:nth-child(2) { animation-delay: 0.8s; }
    .ripple-ring:nth-child(3) { animation-delay: 1.6s; }
    @keyframes rippleOut { 0% { width:10px;height:10px;opacity:0.8; } 100% { width:70px;height:70px;opacity:0; } }
  </style>
</head>
<body>
<div id="map"></div>

<!-- Full-height left panel -->
<div id="panel">
  <img id="photo-main" src="" alt="" />
  <div id="photo-thumbs"></div>
  <div id="panel-body">
    <div id="panel-label">Best match</div>
    <div id="place-name"></div>
    <div id="place-story"></div>
    <div id="fact-section">
      <div class="fact-title">Interesting Fact</div>
      <div id="place-fact"></div>
    </div>
    <div id="stats-grid"></div>
    <div id="nb-section-title">Neighbourhoods on map</div>
    <div id="nb-list"></div>
  </div>
</div>

<!-- 2 mini-cards top-right (non-selected cities) -->
<div id="mini-cards"></div>

<div id="legend">
  <div class="legend-title">Filter Neighbourhoods</div>
  <div class="legend-item" data-tier="budget"><div class="legend-dot" style="background:#5cb85c"></div>Budget<span class="legend-hint">click</span></div>
  <div class="legend-item" data-tier="mid"><div class="legend-dot" style="background:#f0ad4e"></div>Mid-range<span class="legend-hint">click</span></div>
  <div class="legend-item" data-tier="premium"><div class="legend-dot" style="background:#d9534f"></div>Premium<span class="legend-hint">click</span></div>
</div>

<div id="empty-state">
  <h2>Your salary.<br>The whole world.</h2>
  <p>Tell us your situation. We find where you can live better<br>and colour the neighbourhoods by what you can afford.</p>
</div>

<div id="loading">Analysing your options...</div>

<div id="bottom">
  <div id="input-wrap">
    <input id="vibe-input" type="text"
      placeholder="e.g. I earn £45k remotely, want sun, good food, and half the rent"
      autocomplete="off" />
    <button id="submit-btn">Find Places</button>
  </div>
</div>

<script>
  const TIER_COLORS = { budget: '#5cb85c', mid: '#f0ad4e', premium: '#d9534f' };
  const PH_CLASSES  = ['ph-0', 'ph-1', 'ph-2'];

  let map, places = [];
  let selectedIdx = 0;
  let currentMarker = null, nbMarkers = [], openPopup = null;
  let typewriteTimer = null, panelTimeout = null;
  let pendingNeighborhoods = null;
  let activeTierFilter = null;

  fetch('/config').then(r => r.json()).then(({ maptilerKey }) => {
    maptilersdk.config.apiKey = maptilerKey;
    map = new maptilersdk.Map({
      container: 'map', style: maptilersdk.MapStyle.STREETS,
      center: [10, 35], zoom: 2.5,
      attributionControl: { compact: true }
    });
    map.on('styledata', () => {
      if (pendingNeighborhoods) applyNeighbourhoodLayers(pendingNeighborhoods);
    });
  });

  const input       = document.getElementById('vibe-input');
  const btn         = document.getElementById('submit-btn');
  const panel       = document.getElementById('panel');
  const photoMain   = document.getElementById('photo-main');
  const photoThumbs = document.getElementById('photo-thumbs');
  const placeName   = document.getElementById('place-name');
  const placeStory  = document.getElementById('place-story');
  const placeFact   = document.getElementById('place-fact');
  const factSection = document.getElementById('fact-section');
  const statsGrid   = document.getElementById('stats-grid');
  const nbList      = document.getElementById('nb-list');
  const loading     = document.getElementById('loading');
  const miniCards   = document.getElementById('mini-cards');
  const emptyState  = document.getElementById('empty-state');
  const legend      = document.getElementById('legend');
  const bottom      = document.getElementById('bottom');

  function typewrite(el, text, speed = 22) {
    if (typewriteTimer) { clearInterval(typewriteTimer); typewriteTimer = null; }
    el.textContent = '';
    let i = 0;
    typewriteTimer = setInterval(() => {
      el.textContent += text[i++];
      if (i >= text.length) { clearInterval(typewriteTimer); typewriteTimer = null; }
    }, speed);
  }

  function swapMainPhoto(url) {
    photoMain.style.opacity = '0';
    setTimeout(() => {
      photoMain.src = url;
      photoMain.onload = () => { photoMain.style.opacity = '1'; };
    }, 200);
  }

  function renderGallery(photos) {
    photoThumbs.innerHTML = '';
    if (!photos?.length) {
      photoMain.src = ''; photoMain.style.opacity = '0';
      photoThumbs.style.display = 'none'; return;
    }
    photoThumbs.style.display = 'flex';
    photoMain.src = photos[0]; photoMain.style.opacity = '1';
    photos.forEach((url, i) => {
      const img = document.createElement('img');
      img.className = 'thumb' + (i === 0 ? ' active' : '');
      img.src = url; img.alt = '';
      img.addEventListener('click', () => {
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        img.classList.add('active'); swapMainPhoto(url);
      });
      photoThumbs.appendChild(img);
    });
  }

  function renderStats(stats) {
    statsGrid.innerHTML = '';
    if (!stats) return;
    const config = {
      rent:    { label: 'Avg Rent',    cls: 'rent' },
      saving:  { label: 'Cost vs UK',  cls: 'saving' },
      climate: { label: 'Climate',     cls: 'climate' },
      flight:  { label: 'Flight Time', cls: 'flight' },
    };
    Object.entries(stats).forEach(([k, v]) => {
      const c = config[k] || { label: k, cls: '' };
      const box = document.createElement('div');
      box.className = `stat-box ${c.cls}`;
      box.innerHTML = `<div class="stat-label">${c.label}</div><div class="stat-value">${v}</div>`;
      statsGrid.appendChild(box);
    });
  }

  function applyNeighbourhoodLayers(neighborhoods) {
    if (!map.isStyleLoaded()) return;
    try { if (map.getLayer('nb-glow')) map.removeLayer('nb-glow'); } catch(e) {}
    try { if (map.getLayer('nb-ring')) map.removeLayer('nb-ring'); } catch(e) {}
    try { if (map.getSource('nbs'))   map.removeSource('nbs');   } catch(e) {}

    const features = neighborhoods.map(nb => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [nb.lng, nb.lat] },
      properties: { tier: nb.tier }
    }));
    map.addSource('nbs', { type: 'geojson', data: { type: 'FeatureCollection', features } });

    map.addLayer({
      id: 'nb-glow', type: 'circle', source: 'nbs',
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['zoom'], 8, 25, 11, 100, 13, 260, 15, 500],
        'circle-color': ['match', ['get', 'tier'], 'budget', '#5cb85c', 'mid', '#f0ad4e', 'premium', '#d9534f', '#888'],
        'circle-opacity': 0.13, 'circle-blur': 1
      }
    });
    map.addLayer({
      id: 'nb-ring', type: 'circle', source: 'nbs',
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['zoom'], 8, 25, 11, 100, 13, 260, 15, 500],
        'circle-color': 'rgba(0,0,0,0)',
        'circle-stroke-width': 2,
        'circle-stroke-color': ['match', ['get', 'tier'], 'budget', '#5cb85c', 'mid', '#f0ad4e', 'premium', '#d9534f', '#888'],
        'circle-stroke-opacity': 0.55
      }
    });
  }

  function clearMapLayers() {
    nbMarkers.forEach(m => m.remove()); nbMarkers = [];
    if (openPopup) { openPopup.remove(); openPopup = null; }
    try { if (map.getLayer('nb-glow')) map.removeLayer('nb-glow'); } catch(e) {}
    try { if (map.getLayer('nb-ring')) map.removeLayer('nb-ring'); } catch(e) {}
    try { if (map.getSource('nbs'))   map.removeSource('nbs');   } catch(e) {}
  }

  function showNeighbourPopup(nb) {
    if (openPopup) { openPopup.remove(); openPopup = null; }
    openPopup = new maptilersdk.Popup({ closeButton: true, className: 'nb-popup', offset: [0, -14] })
      .setLngLat([nb.lng, nb.lat])
      .setHTML(`<div class="nb-name">${nb.name}</div><div class="nb-rent ${nb.tier}">${nb.rent}</div><div class="nb-vibe">${nb.vibe}</div>`)
      .addTo(map);
  }

  function makeRipple() {
    const el = document.createElement('div');
    el.className = 'ripple-wrap';
    el.innerHTML = `<div class="ripple-ring"></div><div class="ripple-ring"></div><div class="ripple-ring"></div><div class="ripple-dot"></div>`;
    return el;
  }

  function renderMiniCards() {
    miniCards.innerHTML = '';
    places.filter((_, i) => i !== selectedIdx).forEach(place => {
      const actualIdx = places.indexOf(place);
      const card = document.createElement('div');
      card.className = 'mini-card';
      card.innerHTML = `
        <div class="mini-card-bg ${PH_CLASSES[actualIdx]}"></div>
        <div class="mini-card-overlay"></div>
        <div class="mini-card-ring"></div>
        <div class="mini-card-num">0${actualIdx + 1}</div>
        <div class="mini-card-content">
          <div class="mini-card-name">${place.name}</div>
          <div class="mini-card-stat">
            ${place.stats?.rent ? `<span>${place.stats.rent}</span> avg rent` : ''}
          </div>
        </div>`;
      const bg = card.querySelector('.mini-card-bg');
      if (place.photos?.[0]) {
        const img = new Image();
        img.onload = () => { bg.style.backgroundImage = `url('${place.photos[0]}')`; bg.className = 'mini-card-bg'; };
        img.src = place.photos[0];
      }
      card.addEventListener('click', () => selectPlace(actualIdx));
      miniCards.appendChild(card);
    });
    miniCards.classList.add('visible');
  }

  function selectPlace(idx) {
    selectedIdx = idx;
    const place = places[idx];
    if (!place) return;

    renderMiniCards();

    // Reset tier filter on city change
    activeTierFilter = null;
    document.querySelectorAll('.legend-item').forEach(i => {
      i.classList.remove('active');
      i.querySelector('.legend-hint').textContent = 'click';
    });

    if (currentMarker) { currentMarker.remove(); currentMarker = null; }
    clearMapLayers();
    pendingNeighborhoods = null;
    legend.classList.remove('visible');

    map.flyTo({ center: [place.lng, place.lat], zoom: 12, duration: 3400, essential: true });

    map.once('moveend', () => {
      currentMarker = new maptilersdk.Marker({ element: makeRipple(), anchor: 'center' })
        .setLngLat([place.lng, place.lat]).addTo(map);

      if (place.neighborhoods?.length) {
        pendingNeighborhoods = place.neighborhoods;
        legend.classList.add('visible');
        if (map.isStyleLoaded()) applyNeighbourhoodLayers(place.neighborhoods);
        place.neighborhoods.forEach(nb => {
          const color = TIER_COLORS[nb.tier] || '#888';
          const el = document.createElement('div');
          el.style.cssText = `width:12px;height:12px;background:${color};border-radius:50%;border:2.5px solid rgba(255,255,255,0.9);box-shadow:0 0 10px ${color}88;cursor:pointer;transition:transform 0.15s;`;
          el.addEventListener('mouseenter', () => { el.style.transform = 'scale(1.6)'; });
          el.addEventListener('mouseleave', () => { el.style.transform = 'scale(1)'; });
          el.dataset.tier = nb.tier;
          el.addEventListener('click', () => showNeighbourPopup(nb));
          nbMarkers.push(new maptilersdk.Marker({ element: el, anchor: 'center' }).setLngLat([nb.lng, nb.lat]).addTo(map));
        });
      }
    });

    if (panelTimeout) { clearTimeout(panelTimeout); panelTimeout = null; }
    panel.classList.remove('visible');

    panelTimeout = setTimeout(() => {
      renderGallery(place.photos);
      placeName.textContent = place.name;
      placeStory.textContent = '';

      if (place.fact) {
        placeFact.textContent = place.fact;
        factSection.classList.add('visible');
      } else {
        factSection.classList.remove('visible');
      }

      renderStats(place.stats);

      // Neighbourhood panel list (map layers applied separately in moveend)
      nbList.innerHTML = '';
      (place.neighborhoods || []).forEach(nb => {
        const color = TIER_COLORS[nb.tier] || '#888';
        const row = document.createElement('div');
        row.className = 'nb-row';
        row.dataset.tier = nb.tier;
        row.innerHTML = `<div class="nb-dot" style="background:${color};color:${color}"></div><div class="nb-row-name">${nb.name}</div><div class="nb-row-rent">${nb.rent}</div>`;
        row.addEventListener('click', () => {
          map.flyTo({ center: [nb.lng, nb.lat], zoom: 14, duration: 1600, essential: true });
          setTimeout(() => showNeighbourPopup(nb), 1700);
        });
        nbList.appendChild(row);
      });

      panel.classList.add('visible');
      setTimeout(() => typewrite(placeStory, place.story), 350);
    }, 700);
  }

  async function explore() {
    const vibe = input.value.trim();
    if (!vibe) return;
    btn.disabled = true;
    panel.classList.remove('visible');
    miniCards.classList.remove('visible');
    legend.classList.remove('visible');
    loading.classList.add('visible');
    emptyState.classList.add('hidden');

    try {
      const res = await fetch('/vibe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vibe })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      places = data.places || [];
      if (!places.length) throw new Error('No places returned');
      selectedIdx = 0;
      bottom.classList.add('with-panel');
      renderMiniCards();
      selectPlace(0);
    } catch (err) {
      console.error(err);
      emptyState.classList.remove('hidden');
    } finally {
      loading.classList.remove('visible');
      btn.disabled = false;
    }
  }

  function applyTierFilter() {
    // Update legend visuals
    document.querySelectorAll('.legend-item').forEach(item => {
      const active = activeTierFilter && item.dataset.tier === activeTierFilter;
      item.classList.toggle('active', active);
      item.querySelector('.legend-hint').textContent = active ? 'clear' : 'click';
    });

    // Filter map circle layers
    const mapFilter = activeTierFilter ? ['==', ['get', 'tier'], activeTierFilter] : null;
    try { if (map.getLayer('nb-glow')) map.setFilter('nb-glow', mapFilter); } catch(e) {}
    try { if (map.getLayer('nb-ring')) map.setFilter('nb-ring', mapFilter); } catch(e) {}

    // Show/hide dot markers
    nbMarkers.forEach(m => {
      m.getElement().style.display = (!activeTierFilter || m.getElement().dataset.tier === activeTierFilter) ? '' : 'none';
    });

    // Filter panel neighbourhood list
    document.querySelectorAll('.nb-row').forEach(row => {
      row.style.display = (!activeTierFilter || row.dataset.tier === activeTierFilter) ? 'flex' : 'none';
    });
  }

  document.querySelectorAll('.legend-item').forEach(item => {
    item.addEventListener('click', () => {
      activeTierFilter = (activeTierFilter === item.dataset.tier) ? null : item.dataset.tier;
      applyTierFilter();
    });
  });

  btn.addEventListener('click', explore);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') explore(); });
</script>
</body>
</html>
